<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Born For BMX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Arial', sans-serif; }
        header { background: #111; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #e63946; gap: 16px; flex-wrap: wrap; }
        .logo { font-size: 28px; font-weight: 900; color: #e63946; letter-spacing: 2px; }
        nav { display: flex; align-items: center; gap: 24px; }
        nav a { color: #fff; text-decoration: none; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        nav a:hover { color: #e63946; }
        .search-wrap { display: flex; align-items: center; gap: 6px; }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 13px; outline: none; width: 180px; transition: all 0.3s; }
        .search-input:focus { border-color: #e63946; width: 220px; }
        .search-input::placeholder { color: #555; }
        .search-clear { background: none; border: none; color: #555; cursor: pointer; font-size: 16px; display: none; }

        /* HERO SLIDER */
        .hero { position: relative; min-height: 90vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .slider { position: absolute; inset: 0; }
        .slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.2s ease; }
        .slide.active { opacity: 1; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.70) 100%); z-index: 1; }
        .hero-content { position: relative; z-index: 2; text-align: center; padding: 40px 20px; animation: fadeUp 1s ease both; }
        .hero-eyebrow { font-size: 12px; letter-spacing: 5px; text-transform: uppercase; color: #e63946; margin-bottom: 18px; font-weight: 600; }
        .hero-title { font-family: 'Impact', 'Arial Black', sans-serif; font-size: clamp(52px, 9vw, 110px); font-weight: 900; text-transform: uppercase; letter-spacing: 6px; line-height: 1; color: #fff; text-shadow: 0 4px 30px rgba(0,0,0,0.5); }
        .hero-title span { color: #e63946; }
        .hero-tagline { margin-top: 20px; font-family: 'Georgia', 'Times New Roman', serif; font-size: clamp(20px, 3vw, 36px); font-style: italic; color: rgba(255,255,255,0.85); letter-spacing: 2px; }
        .hero-cta { display: inline-block; margin-top: 36px; padding: 14px 40px; background: #e63946; color: #fff; text-decoration: none; font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; border-radius: 2px; transition: all 0.3s; box-shadow: 0 4px 20px rgba(230,57,70,0.4); }
        .hero-cta:hover { background: #c1121f; transform: translateY(-2px); }
        .slider-dots { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 3; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.35); cursor: pointer; transition: all 0.3s; }
        .dot.active { background: #e63946; width: 24px; border-radius: 4px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .categories { padding: 20px 40px; background: #111; border-bottom: 1px solid #222; border-top: 1px solid #222; }
        .cat-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
        .cat-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: #e63946; border-color: #e63946; transform: translateY(-2px); }
        .subcat-row { display: none; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 8px 0; border-top: 1px solid #222; margin-top: 8px; }
        .subcat-row.show { display: flex; }
        .subcat-btn { background: #0a0a0a; color: #aaa; border: 1px solid #222; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 11px; text-transform: uppercase; transition: all 0.3s; }
        .subcat-btn:hover, .subcat-btn.active { background: #333; border-color: #e63946; color: #fff; }
        .products { padding: 40px 40px 60px; }
        .sort-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .sort-bar h2 { font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .sort-bar h2 span { color: #e63946; }
        .sort-btns { display: flex; gap: 8px; }
        .sort-btn { background: #1a1a1a; color: #aaa; border: 1px solid #333; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 12px; text-transform: uppercase; transition: all 0.2s; }
        .sort-btn:hover { border-color: #555; color: #fff; }
        .sort-btn.active { background: #e63946; color: #fff; border-color: #e63946; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .card { background: #111; border: 1px solid #222; border-radius: 8px; overflow: hidden; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .card:hover { transform: translateY(-8px); border-color: #e63946; box-shadow: 0 20px 40px rgba(230, 57, 70, 0.2); }
        .card-img-wrap { overflow: hidden; height: 220px; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .card:hover img { transform: scale(1.08); }
        .card-body { padding: 20px; }
        .card-cat { font-size: 11px; color: #e63946; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .card-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; transition: color 0.3s; }
        .card:hover .card-name { color: #e63946; }
        .card-price { font-size: 22px; font-weight: 900; color: #e63946; margin-bottom: 16px; }
        .order-btn { width: 100%; background: #e63946; color: #fff; border: none; padding: 12px; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-radius: 4px; transition: all 0.3s; position: relative; overflow: hidden; }
        .order-btn::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; background: rgba(255,255,255,0.2); border-radius: 50%; transform: translate(-50%,-50%); transition: width 0.6s, height 0.6s; }
        .order-btn:hover::before { width: 300px; height: 300px; }
        .order-btn:hover { background: #c1121f; transform: scale(1.02); }
        .tooltip { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.85); padding: 12px; font-size: 13px; color: #ccc; transform: translateY(100%); transition: transform 0.3s ease; }
        .card:hover .tooltip { transform: translateY(0); }
        .empty { text-align: center; padding: 80px; color: #444; grid-column: 1/-1; }
        .empty p { font-size: 20px; margin-top: 16px; }
        .admin-fab { position: fixed; bottom: 30px; right: 30px; background: #e63946; color: #fff; border: none; width: 56px; height: 56px; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(230,57,70,0.4); transition: all 0.3s; z-index: 999; }
        .admin-fab:hover { transform: scale(1.1) rotate(90deg); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #111; border: 1px solid #333; border-radius: 12px; padding: 40px; width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
        .modal h2 { font-size: 24px; font-weight: 900; margin-bottom: 24px; color: #e63946; text-transform: uppercase; }

        .login-form input:focus { border-color: #e63946; }
        .btn-red { width: 100%; background: #e63946; color: #fff; border: none; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: background 0.3s; }
        .btn-red:hover { background: #c1121f; }
        .error-msg { color: #e63946; font-size: 13px; margin-bottom: 12px; display: none; }
        .admin-form { display: none; }
        .admin-form.show { display: block; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; font-size: 14px; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #e63946; }
        .form-group select option { background: #1a1a1a; }
        .img-preview { width: 100%; height: 150px; object-fit: cover; border-radius: 6px; margin-top: 8px; display: none; border: 1px solid #333; }
        .admin-products { margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
        .admin-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .admin-filter-btn { background: #1a1a1a; color: #aaa; border: 1px solid #333; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; text-transform: uppercase; transition: all 0.2s; }
        .admin-filter-btn:hover, .admin-filter-btn.active { background: #e63946; border-color: #e63946; color: #fff; }
        .admin-product-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #1a1a1a; border-radius: 6px; margin-bottom: 8px; border: 1px solid #222; }
        .admin-product-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .admin-product-info { flex: 1; min-width: 0; }
        .admin-product-info strong { display: block; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .edit-btn { background: #1a3a5c; color: #fff; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        footer span { color: #e63946; }
        .loading { text-align: center; padding: 40px; color: #666; grid-column: 1/-1; }
        @media (max-width: 768px) {

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ADMIN_PASSWORD = 'bmx2026';
    const CATS = { complete:'Complete Bikes', frames:'Frames & Forks', steering:'Steering', wheels:'Wheels & Tires', drivetrain:'Drivetrain', grind:'Grind', brakes:'Brakes', seat:'Seat & Post', other:'Other' };
    const SUBCATS = {
        frames: ['Frame', 'Fork'],
        wheels: ['Hub', 'Rim', 'Tire'],
        steering: ['Handlebar', 'Stem', 'Headset', 'Grip'],
        drivetrain: ['Crank', 'Sprocket', 'Chain', 'Pedal', 'BB'],
        seat: ['Seat', 'Post'],
        complete: [], grind: [], brakes: [], other: []
    };

    let products = [];
    let currentCat = 'all';
    let currentSubcat = 'all';
    let adminCat = 'all';
    let editingId = null;
    let searchQuery = '';
    let sortOrder = 'none';

    async function loadProducts() {
        const { data, error } = await sb.from('products').select('*').order('id', { ascending: false });
        if (error) { console.error(error); return; }
        products = data || [];
        renderProducts();
    }

    function getPrice(p) {
        return parseFloat((p.price || '0').replace(/[^0-9.]/g, '')) || 0;
    }

    function copyAndOrder(name, price) {
        const msg = `Сайн байна уу! "${name}" (${price}) захиалмаар байна.`;
        navigator.clipboard.writeText(msg).then(() => {
            alert('✅ Мессеж хуулагдлаа!\n\nMessenger нээгдэнэ — paste хийгээд явуулна уу');
            window.open('https://m.me/108317618117337', '_blank');
        }).catch(() => {
            window.open(`https://m.me/108317618117337?text=${encodeURIComponent(msg)}`, '_blank');
        });
    }

    function sortProducts(order) {
        sortOrder = order;
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        const ids = { none: 'sortNew', low: 'sortLow', high: 'sortHigh' };
        if (ids[order]) document.getElementById(ids[order]).classList.add('active');
        renderProducts();
    }

    function searchProducts() {
        searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
        document.getElementById('searchClear').style.display = searchQuery ? 'block' : 'none';
        renderProducts();
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        searchQuery = '';
        document.getElementById('searchClear').style.display = 'none';
        renderProducts();
    }

    function filterCat(cat, btn) {
        currentCat = cat;
        currentSubcat = 'all';
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const subcatRow = document.getElementById('subcatRow');
        const subs = SUBCATS[cat] || [];
        if (subs.length > 0) {
            subcatRow.innerHTML = `<button class="subcat-btn active" onclick="filterSubcat('all', this)">All</button>` +
                subs.map(s => `<button class="subcat-btn" onclick="filterSubcat('${s}', this)">${s}</button>`).join('');
            subcatRow.classList.add('show');
        } else {
            subcatRow.classList.remove('show');
            subcatRow.innerHTML = '';
        }
        renderProducts();
    }

    function filterSubcat(subcat, btn) {
        currentSubcat = subcat;
        document.querySelectorAll('.subcat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        let filtered = currentCat === 'all' ? [...products] : products.filter(p => p.cat === currentCat);
        if (currentSubcat !== 'all') filtered = filtered.filter(p => p.subcat === currentSubcat);
        if (searchQuery) filtered = filtered.filter(p =>
            (p.name||'').toLowerCase().includes(searchQuery) ||
            (p.desc||'').toLowerCase().includes(searchQuery) ||
            (p.cat||'').toLowerCase().includes(searchQuery) ||
            (p.subcat||'').toLowerCase().includes(searchQuery)
        );
        if (sortOrder === 'low') filtered.sort((a, b) => getPrice(a) - getPrice(b));
        else if (sortOrder === 'high') filtered.sort((a, b) => getPrice(b) - getPrice(a));
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty"><p>Бүтээгдэхүүн байхгүй байна</p></div>';
            return;
        }
        filtered.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img-wrap">
                    <img src="${p.img || 'https://placehold.co/400x220/1a1a1a/e63946?text=No+Image'}" alt="${p.name}" onerror="this.src='https://placehold.co/400x220/1a1a1a/e63946?text=No+Image'">
                    ${p.desc ? `<div class="tooltip">${p.desc}</div>` : ''}
                </div>
                <div class="card-body">
                    <div class="card-cat">${CATS[p.cat]||p.cat}${p.subcat?' — '+p.subcat:''}</div>
                    <div class="card-name">${p.name}</div>
                    <div class="card-price">${p.price}</div>
                    <button class="order-btn">💬 Захиалах</button>
                </div>`;
            card.querySelector('.order-btn').addEventListener('click', e => { e.stopPropagation(); copyAndOrder(p.name, p.price); });
            card.addEventListener('click', () => { window.location.href = `/product.html?id=${p.id}`; });
            grid.appendChild(card);
        });
    }

    function filterAdmin(cat, btn) {
        adminCat = cat;
        document.querySelectorAll('.admin-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAdminList();
    }

    function renderAdminList() {
        const filtered = adminCat === 'all' ? products : products.filter(p => p.cat === adminCat);
        document.getElementById('adminProductList').innerHTML = filtered.map(p => `
            <div class="admin-product-item">
                <img src="${p.img||'https://placehold.co/50x50/1a1a1a/e63946?text=?'}" onerror="this.src='https://placehold.co/50x50/1a1a1a/e63946?text=?'">
                <div class="admin-product-info">
                    <strong>${p.name}</strong>
                    <span>${p.price} — ${CATS[p.cat]||p.cat}${p.subcat?' / '+p.subcat:''}</span>
                </div>
                <div class="admin-btns">
                    <button class="edit-btn" onclick="startEdit(${p.id})">✏️</button>
                    <button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️</button>
                </div>
            </div>`).join('') || '<p style="color:#444;font-size:13px;">Бүтээгдэхүүн байхгүй</p>';
    }

    function startEdit(id) {
        const p = products.find(x => x.id === id);
        if (!p) return;
        editingId = id;
        document.getElementById('prodName').value = p.name||'';
        document.getElementById('prodPrice').value = p.price||'';
        document.getElementById('prodCat').value = p.cat||'complete';
        document.getElementById('prodImg').value = p.img||'';
        document.getElementById('prodDesc').value = p.desc||'';
        updateSubcatSelect();
        if (p.subcat) document.getElementById('prodSubcat').value = p.subcat;
        if (p.img) { document.getElementById('imgPreview').src = p.img; document.getElementById('imgPreview').style.display = 'block'; }
        document.getElementById('submitBtn').textContent = '✅ Хадгалах';
        document.getElementById('cancelBtn').style.display = 'block';
        document.getElementById('formTitle').textContent = '✏️ Засах';
        document.querySelector('.modal').scrollTop = 0;
    }

    function cancelEdit() {
        editingId = null;
        document.getElementById('prodName').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('prodImg').value = '';
        document.getElementById('prodDesc').value = '';
        document.getElementById('imgPreview').style.display = 'none';
        document.getElementById('submitBtn').textContent = '+ Бүтээгдэхүүн нэмэх';
        document.getElementById('cancelBtn').style.display = 'none';
        document.getElementById('formTitle').textContent = 'Бүтээгдэхүүний нэр';
        document.getElementById('subcatGroup').style.display = 'none';
    }

    function updateSubcatSelect() {
        const cat = document.getElementById('prodCat').value;
        const subs = SUBCATS[cat] || [];
        const group = document.getElementById('subcatGroup');
        const select = document.getElementById('prodSubcat');
        if (subs.length > 0) {
            select.innerHTML = `<option value="">— Сонгох —</option>` + subs.map(s => `<option value="${s}">${s}</option>`).join('');
            group.style.display = 'block';
        } else { group.style.display = 'none'; }
    }

    async function submitProduct() {
        const name = document.getElementById('prodName').value.trim();
        const price = document.getElementById('prodPrice').value.trim();
        const cat = document.getElementById('prodCat').value;
        const img = document.getElementById('prodImg').value.trim();
        const desc = document.getElementById('prodDesc').value.trim();
        const subcat = document.getElementById('prodSubcat').value || null;
        if (!name || !price) { alert('Нэр болон үнэ оруулна уу!'); return; }
        if (editingId) {
            const { error } = await sb.from('products').update({ name, price, cat, img, desc, subcat }).eq('id', editingId);
            if (error) { alert('Алдаа гарлаа!'); return; }
        } else {
            const { error } = await sb.from('products').insert([{ name, price, cat, img, desc, subcat }]);
            if (error) { alert('Алдаа гарлаа!'); return; }
        }
        cancelEdit();
        await loadProducts();
        renderAdminList();
    }

    function openAdmin() {
        document.getElementById('adminModal').classList.add('open');
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('adminForm').classList.remove('show');
        document.getElementById('passwordInput').value = '';
        document.getElementById('errorMsg').style.display = 'none';
    }

    function closeAdmin() {
        document.getElementById('adminModal').classList.remove('open');
        cancelEdit();
    }

    function checkPassword() {
        const pw = document.getElementById('passwordInput').value;
        if (pw === ADMIN_PASSWORD) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminForm').classList.add('show');
            updateSubcatSelect();
            renderAdminList();
        } else { document.getElementById('errorMsg').style.display = 'block'; }
    }

    function previewImg() {
        const url = document.getElementById('prodImg').value;
        const preview = document.getElementById('imgPreview');
        if (url) { preview.src = url; preview.style.display = 'block'; }
        else { preview.style.display = 'none'; }
    }

    async function deleteProduct(id) {
        if (confirm('Устгах уу?')) {
            await sb.from('products').delete().eq('id', id);
            await loadProducts();
            renderAdminList();
        }
    }

    document.getElementById('adminModal').addEventListener('click', function(e) {
        if (e.target === this) closeAdmin();
    });

    // SLIDER
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    function goToSlide(n) {
        slides[currentSlide].classList.remove('active');
        dots[currentSlide].classList.remove('active');
        currentSlide = n;
        slides[currentSlide].classList.add('active');
        dots[currentSlide].classList.add('active');
    }
    setInterval(() => goToSlide((currentSlide + 1) % slides.length), 2500);
    document.querySelector('.hero-cta').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('productGrid').scrollIntoView({ behavior: 'smooth' });
    });

    loadProducts();
</script>
</body>
</html>
