    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Arial', sans-serif; }
        header { background: #111; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #e63946; }
        .logo { font-size: 28px; font-weight: 900; color: #e63946; letter-spacing: 2px; text-decoration: none; }
        nav a { color: #fff; text-decoration: none; margin-left: 30px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        nav a:hover { color: #e63946; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: #aaa; text-decoration: none; font-size: 14px; margin: 30px 40px; transition: color 0.3s; }
        .back-btn:hover { color: #e63946; }
        .product-container { max-width: 1100px; margin: 0 auto; padding: 0 40px 60px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        .main-img { width: 100%; height: 400px; object-fit: cover; border-radius: 8px; border: 1px solid #222; }
        .thumb-row { display: flex; gap: 12px; margin-top: 12px; }
        .thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 2px solid #222; cursor: pointer; transition: border-color 0.2s; }
        .thumb:hover, .thumb.active { border-color: #e63946; }
        .product-cat { font-size: 12px; color: #e63946; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
        .product-name { font-size: 32px; font-weight: 900; margin-bottom: 16px; line-height: 1.2; }
        .product-price { font-size: 36px; font-weight: 900; color: #e63946; margin-bottom: 24px; }
        .product-desc { color: #aaa; font-size: 15px; line-height: 1.8; margin-bottom: 32px; white-space: pre-line; }
        .order-btn { width: 100%; background: #e63946; color: #fff; border: none; padding: 16px; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-radius: 6px; transition: all 0.3s; }
        .order-btn:hover { background: #c1121f; transform: scale(1.01); }
        .divider { border: none; border-top: 1px solid #222; margin: 24px 0; }
        .loading { text-align: center; padding: 80px; color: #444; }
        footer { background: #111; border-top: 2px solid #e63946; padding: 40px; text-align: center; color: #666; font-size: 13px; margin-top: 40px; }
        footer span { color: #e63946; }
        @media (max-width: 768px) {
            .product-container { grid-template-columns: 1fr; gap: 30px; padding: 0 20px 40px; }
            .back-btn { margin: 20px; }
            .product-name { font-size: 24px; }
            .product-price { font-size: 28px; }
            header { padding: 16px 20px; }
            .logo { font-size: 20px; }
        }
    </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://rfxldbygppleeosbabpv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmeGxkYnlncHBsZWVvc2JhYnB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NTg0ODgsImV4cCI6MjA5OTMzNDQ4OH0.KPxfC46PMVSZwHjbTpraBrfsQPXMco9erJhmk-eAvWY';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const CATS = { complete:'Complete Bikes', frames:'Frames & Forks', steering:'Steering', wheels:'Wheels & Tires', drivetrain:'Drivetrain', grind:'Grind', brakes:'Brakes', seat:'Seat & Post', other:'Other' };

    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    let currentProduct = null;

    async function loadProduct() {
        if (!productId) { window.location.href = '/'; return; }
        const { data, error } = await sb.from('products').select('*').eq('id', productId).single();
        if (error || !data) { window.location.href = '/'; return; }
        currentProduct = data;
        renderProduct(data);
    }

    function renderProduct(p) {
        const imgs = [p.img, p.img2, p.img3].filter(Boolean);
        const placeholder = 'https://placehold.co/600x400/1a1a1a/e63946?text=No+Image';
        document.title = `${p.name} — Born For BMX`;
        document.getElementById('productContainer').innerHTML = `
            <div class="product-images">
                <img id="mainImg" class="main-img" src="${imgs[0] || placeholder}" alt="${p.name}">
                ${imgs.length > 1 ? `
                <div class="thumb-row">
                    ${imgs.map((img, i) => `
                        <img class="thumb ${i===0?'active':''}" src="${img}" onclick="changeImg('${img}', this)" alt="img${i+1}">
                    `).join('')}
                </div>` : ''}
            </div>
            <div class="product-info">
                <div class="product-cat">${CATS[p.cat] || p.cat}</div>
                <div class="product-name">${p.name}</div>
                <div class="product-price">${p.price}</div>
                ${p.desc ? `<div class="product-desc">${p.desc}</div>` : ''}
                ${p.desc2 ? `<hr class="divider"><div class="product-desc">${p.desc2}</div>` : ''}
                <button class="order-btn" onclick="doOrder()">💬 Захиалах</button>
            </div>
        `;
    }

    function doOrder() {
        if (!currentProduct) return;
        const msg = encodeURIComponent(`Сайн байна уу! "${currentProduct.name}" (${currentProduct.price}) захиалмаар байна.`);
        window.open(`https://m.me/108317618117337?text=${msg}`, '_blank');
    }

    function changeImg(src, el) {
        document.getElementById('mainImg').src = src;
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    loadProduct();
</script>
</body>
